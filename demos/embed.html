<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Slider Lola Mora Embed</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        position: relative;
        height: 100%;
        width: 100%;
        background-color: #000;
        overflow: hidden;
      }

      /* Swiper */
      .swiper {
        width: 100%;
        height: 100%;
      }

      .swiper-slide {
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .swiper-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Custom Navigation arrows and Pagination styling */
      .swiper-button-next, .swiper-button-prev {
        color: #d4af37 !important;
        background: rgba(0, 0, 0, 0.4);
        width: 44px !important;
        height: 44px !important;
        border-radius: 50%;
        backdrop-filter: blur(4px);
        transition: all 0.3s ease;
      }

      .swiper-button-next:after, .swiper-button-prev:after {
        font-size: 16px !important;
        font-weight: bold;
      }

      .swiper-button-next:hover, .swiper-button-prev:hover {
        background: #d4af37;
        color: #000 !important;
      }

      .swiper-pagination-bullet {
        background: #fff !important;
        opacity: 0.4;
      }

      .swiper-pagination-bullet-active {
        background: #d4af37 !important;
        opacity: 1 !important;
        width: 20px !important;
        border-radius: 4px !important;
        transition: all 0.3s ease;
      }

      /* Fallback state when there are no images */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: sans-serif;
        text-align: center;
        height: 100%;
        padding: 20px;
      }

      .empty-state h2 {
        font-size: 18px;
        margin-bottom: 10px;
        color: #d4af37;
      }

      .empty-state p {
        font-size: 14px;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div id="slider-root" style="width: 100%; height: 100%;">
      <div class="empty-state">
        <h2>Cargando imágenes...</h2>
        <p>Por favor, asegúrate de colocar fotos en la carpeta /images</p>
      </div>
    </div>

    <!-- Swiper JS & initialization -->
    <script type="module">
      import Swiper from 'swiper/swiper-bundle.mjs';
      import 'swiper/swiper-bundle.css';

      async function initEmbedSlider() {
        try {
          let imagesList = [];
          try {
            const res = await fetch('/api/images');
            if (res.ok) {
              imagesList = await res.json();
            }
          } catch (e) {}

          if (!imagesList || imagesList.length === 0) {
            const res = await fetch('/images.json');
            imagesList = await res.json();
          }
          renderSlider(imagesList);
        } catch (err) {
          console.error("Error al cargar imágenes para embed:", err);
          // Try rendering empty state
          renderSlider([]);
        }
      }

      function renderSlider(imagesList) {
        const root = document.getElementById('slider-root');
        
        if (imagesList.length === 0) {
          root.innerHTML = `
            <div class="empty-state">
              <h2>No se encontraron fotos</h2>
              <p>Agrega imágenes en la carpeta <strong>/images</strong> de la raíz y recarga esta página.</p>
            </div>
          `;
          return;
        }

        let slidesHtml = '';
        imagesList.forEach((filename) => {
          slidesHtml += `
            <div class="swiper-slide">
              <img src="/images/${filename}" alt="${filename}" />
            </div>
          `;
        });

        root.innerHTML = `
          <div class="swiper">
            <div class="swiper-wrapper">
              ${slidesHtml}
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
          </div>
        `;

        new Swiper('.swiper', {
          effect: 'slide',
          speed: 800,
          loop: imagesList.length > 1,
          autoplay: {
            delay: 3000,
            disableOnInteraction: false,
          },
          pagination: {
            el: '.swiper-pagination',
            clickable: true,
            dynamicBullets: true,
          },
          navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
          },
        });
      }

      // Initial loading
      initEmbedSlider();
    </script>
  </body>
</html>
